tacrp.balance.adsspread=瞄准射击散布倍率
tacrp.balance.adsspread.desc=缩放武器的基础散布——即完全瞄准时的散布圆锥。此基础始终存在，因此降低它也会收紧腰射（腰射 = 基础 + 腰射惩罚）。双持武器无法瞄准，因此此设置对其不适用。
tacrp.balance.hipspread=腰射散布倍率
tacrp.balance.hipspread.desc=缩放腰射惩罚，该惩罚叠加在基础散布之上，并在瞄准时逐渐归零。双持武器（无法瞄准）改为将此倍率应用于其基础散布。
tacrp.balance.shotgunspread=霰弹弹丸散布倍率
tacrp.balance.shotgunspread.desc=缩放霰弹枪的单颗弹丸散布——即弹丸在整体射击圆锥内的散开程度。不影响圆锥本身。

tacrp.mechanics.onebuttonakimbo=单键双持
tacrp.mechanics.onebuttonakimbo.desc=对于双持武器，将控制合并为单一按键：左键同时开火两把枪（半自动/点射模式下交替开火，全自动模式下同时开火），右键执行近战攻击。
