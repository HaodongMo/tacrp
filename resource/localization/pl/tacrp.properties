tacrp.balance.adsspread=Mnożnik Rozrzutu na Celowaniu
tacrp.balance.adsspread.desc=Skaluje podstawowy rozrzut broni — stożek, który otrzymujesz podczas pełnego celowania. Ta podstawa jest zawsze obecna, więc jej zmniejszenie zmniejsza również rozrzut z biodra (z biodra = podstawa + kara z biodra). Dwuręczne bronie nie mogą celować, więc to ustawienie ich nie dotyczy.
tacrp.balance.hipspread=Mnożnik Rozrzutu z Biodra
tacrp.balance.hipspread.desc=Skaluje karę strzelania z biodra, która jest dodawana do podstawowego rozrzutu i zanika do zera podczas celowania. Dwuręczne bronie (które nie mogą celować) używają tego mnożnika na swoim podstawowym rozrzucie.
tacrp.balance.shotgunspread=Mnożnik Rozrzutu Śrutu
tacrp.balance.shotgunspread.desc=Skaluje rozrzut pojedynczych śrucin — jak bardzo poszczególne śruciny rozpraszają się w ogólnym stożku strzału. Nie wpływa na sam stożek.

tacrp.mechanics.onebuttonakimbo=Dwuręczne na Jeden Przycisk
tacrp.mechanics.onebuttonakimbo.desc=Dla broni dwuręcznych łączy sterowanie w jeden przycisk: lewy przycisk myszy strzela z obu broni (naprzemiennie przy pół-automatycznych/seryjnych, jednocześnie przy w pełni automatycznych), a prawy wykonuje atak w zwarciu.
